rules:
  # Bronze
  action-setup:
    status: todo
    comment: >
      Service actions are registered in async_setup_entry rather than at the
      integration-level async_setup, so they are re-registered on every entry
      reload. Needs refactoring to register once in async_setup.
  appropriate-polling:
    status: exempt
    comment: >
      This is not a polling integration. Sync runs are triggered by service
      calls, a manual button press, or a scheduled timer — not by polling.
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions: done
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data:
    status: done
    comment: >
      Runtime state is stored in ConfigEntry.runtime_data using the
      HassDataBricksRuntimeData dataclass.
  test-before-configure:
    status: done
    comment: >
      Config flow tests Databricks connectivity via SELECT 1 before creating
      the entry; includes a 30s retry window for SQL warehouse startup.
      Shows cannot_connect or invalid_auth errors on failure.
  test-before-setup:
    status: done
    comment: >
      async_setup_entry verifies Databricks connectivity at startup (with 30s retry).
      Raises ConfigEntryNotReady on transient failure, triggers reauth on auth errors.
  unique-config-entry: done

  # Silver
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow: done
  test-coverage: done

  # Gold
  devices:
    status: done
    comment: >
      The button entity registers a device via device_info with identifiers,
      name, manufacturer, and model.
  diagnostics:
    status: todo
    comment: No diagnostics download support implemented.
  discovery-update-info:
    status: exempt
    comment: >
      Service-based integration; there are no discoverable network devices
      whose network information needs to be updated.
  discovery:
    status: exempt
    comment: >
      Databricks workspace is a cloud service configured by the user; automatic
      discovery is not applicable.
  docs-data-update: done
  docs-examples:
    status: todo
    comment: >
      README includes a basic service-call YAML snippet but lacks automation
      and dashboard examples.
  docs-known-limitations: done
  docs-supported-devices:
    status: exempt
    comment: Integration does not interact with hardware devices.
  docs-supported-functions: done
  docs-troubleshooting:
    status: todo
    comment: README does not include a troubleshooting section.
  docs-use-cases:
    status: todo
    comment: >
      README explains what the sync does technically but lacks HA-automation
      use-case examples.
  dynamic-devices:
    status: exempt
    comment: >
      Device registry entries are static per config entry; no dynamic device
      addition is applicable.
  entity-category:
    status: done
    comment: Status sensors (run, rows, success) are assigned to EntityCategory.DIAGNOSTIC.
  entity-device-class:
    status: todo
    comment: >
      Only the last-success sensor uses SensorDeviceClass.TIMESTAMP; last-run
      and last-rows sensors lack an appropriate device class.
  entity-disabled-by-default:
    status: exempt
    comment: >
      All entities provide essential sync status information; none are
      noisy or diagnostic-only.
  entity-translations:
    status: todo
    comment: >
      Sensor names are set via _attr_name string literals instead of
      translation keys in strings.json / translations/*.json.
  exception-translations:
    status: todo
    comment: Exception messages are plain strings, not translatable keys.
  icon-translations:
    status: todo
    comment: Icons are set via hard-coded _attr_icon strings, not icon translation files.
  reconfiguration-flow:
    status: done
    comment: async_step_reconfigure is implemented in the config flow.
  repair-issues:
    status: todo
    comment: No HA repair issues or repair flows are used.
  stale-devices:
    status: exempt
    comment: >
      One device per config entry; device is removed when entry is unloaded.
      No stale device cleanup needed.

  # Platinum
  async-dependency:
    status: done
    comment: >
      Integration uses aiohttp (async) for all Databricks REST API calls.
      Synchronous file I/O is offloaded via hass.async_add_executor_job.
  inject-websession:
    status: done
    comment: >
      The integration accepts an aiohttp.ClientSession via
      async_get_clientsession(hass) and passes it to the pipeline.
  strict-typing:
    status: todo
    comment: Codebase has type hints but is not enforced with strict mypy / pylance settings.
