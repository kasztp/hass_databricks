[project]
name = "hass-databricks"
version = "0.1.0"
description = ""
readme = "README.md"
requires-python = ">=3.11"
authors = [ { name = "Peter Kaszt", email = "kasztp@gmail.com" } ]
dependencies = [
	"pandas>=2.2.3",
	"pyarrow>=17.0.0",
	"databricks-sql-connector>=3.6.0",
	"pydantic>=2.9.2",
]

[project.optional-dependencies]
test = [
	"pytest>=8.3.3",
	"pylint>=3.3.1",
	"pytest-cov>=6.0.0",
	"homeassistant>=2024.1.0",
]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["hass_databricks*"]
